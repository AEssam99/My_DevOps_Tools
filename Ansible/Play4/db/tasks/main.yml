---
# tasks file for db

    - name: Install mariadb package
      ansible.builtin.package:
        name:
          - mariadb
          - mariadb-server
        state: present

    - name: enable and start mariadb
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: yes

    - name: Install PyMySQL for mysql module
      ansible.builtin.package:
        name:
          - python3-PyMySQL.noarch
        state: present

    - name: Create new databases for Rocky / Centos
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock
      when: ansible_distribution == "CentOS" or ansible_distribution == "Rocky"

    - name: Create new databases for Ubuntu
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /run/mysqld/mysqld.sock
      when: ansible_distribution == "Ubuntu"

    - name: Create database user for Rocky / Centos
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: '{{ db_name }}.*:ALL'
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock
      when: ansible_distribution == "CentOS" or ansible_distribution == "Rocky"

    - name: Create database user for Ubuntu
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: '{{ db_name }}.*:ALL'
        state: present
        login_unix_socket: /run/mysqld/mysqld.sock
      when: ansible_distribution == "Ubuntu"

